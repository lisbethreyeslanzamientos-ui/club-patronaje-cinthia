<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Telas – Embed GHL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f9f5f2; }

    .wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .card-header {
      background: #b5845a;
      color: #fff;
      padding: 20px 28px;
    }

    .card-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: .875rem;
      opacity: .85;
    }

    iframe {
      width: 100%;
      border: none;
      display: block;
      min-height: 700px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="card-header">
        <h2>Calculadora de Telas</h2>
        <p>Calcula la cantidad de tela que necesitas para tu proyecto.</p>
      </div>

      <!--
        INSTRUCCIONES PARA GHL:
        1. Ve al lesson donde quieres insertar la calculadora.
        2. Agrega un bloque "Custom Code" o "HTML".
        3. Pega el <iframe> de abajo en ese bloque.
        4. Ajusta el height según necesites.
      -->

      <iframe
        src="https://lisbethreyeslanzamientos-ui.github.io/calculadoradetelas/"
        title="Calculadora de Telas"
        loading="lazy"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</body>
</html>
